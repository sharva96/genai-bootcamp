<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Module 5 — Streaming Chatbot</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* Header */
      .topbar {
        background: #1e293b;
        border-bottom: 1px solid #334155;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      .brand {
        font-size: 1.05rem;
        font-weight: 700;
        color: #22d3ee;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .brand-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #34d399;
        animation: pulse 1.6s infinite ease-in-out;
      }
      @keyframes pulse {
        50% {
          opacity: 0.4;
          transform: scale(0.8);
        }
      }
      .topbar-spacer {
        flex: 1;
      }
      .selector {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .selector label {
        font-size: 0.74rem;
        color: #94a3b8;
      }
      select {
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 7px;
        color: #e2e8f0;
        padding: 6px 10px;
        font-size: 0.82rem;
        font-family: inherit;
        cursor: pointer;
      }
      select:focus {
        border-color: #06b6d4;
        outline: none;
      }
      .btn {
        padding: 7px 14px;
        border-radius: 7px;
        border: none;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 600;
        transition: all 0.15s;
      }
      .btn-primary {
        background: #06b6d4;
        color: #0f172a;
      }
      .btn-primary:hover {
        background: #22d3ee;
      }
      .btn-secondary {
        background: #0f172a;
        border: 1px solid #334155;
        color: #94a3b8;
      }
      .btn-secondary:hover {
        border-color: #06b6d4;
        color: #e2e8f0;
      }
      .btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      /* Main layout */
      .layout {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 280px;
        gap: 0;
        overflow: hidden;
      }
      .chat-col {
        display: flex;
        flex-direction: column;
        padding: 24px;
        overflow: hidden;
        max-width: 900px;
        width: 100%;
        margin: 0 auto;
      }
      .right-col {
        background: #1e293b;
        border-left: 1px solid #334155;
        padding: 20px;
        overflow-y: auto;
      }

      /* Chat window */
      .chat-window {
        flex: 1;
        overflow-y: auto;
        padding: 8px 4px 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .msg {
        display: flex;
        gap: 12px;
        max-width: 90%;
      }
      .msg.user {
        align-self: flex-end;
        flex-direction: row-reverse;
      }
      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #1e293b;
        border: 1.5px solid #334155;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.95rem;
        flex-shrink: 0;
      }
      .msg.user .avatar {
        background: rgba(6, 182, 212, 0.15);
        border-color: #06b6d4;
      }
      .bubble {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 14px;
        padding: 11px 15px;
        font-size: 0.9rem;
        line-height: 1.55;
        color: #cbd5e1;
      }
      .msg.user .bubble {
        background: rgba(6, 182, 212, 0.1);
        border-color: rgba(6, 182, 212, 0.35);
        color: #67e8f9;
      }
      .msg.bot .bubble {
        white-space: pre-wrap;
        word-break: break-word;
      }
      .msg.bot .bubble strong {
        color: #f1f5f9;
      }
      .msg-meta {
        font-size: 0.66rem;
        color: #475569;
        margin-top: 4px;
        font-family: "Consolas", monospace;
      }
      .msg.user .msg-meta {
        text-align: right;
      }
      .cursor {
        display: inline-block;
        width: 7px;
        height: 14px;
        background: #22d3ee;
        vertical-align: text-bottom;
        animation: blink 0.8s infinite;
        margin-left: 2px;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
      .typing {
        display: flex;
        gap: 4px;
        padding: 4px 0;
      }
      .typing span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #475569;
        animation: typing 1.2s infinite;
      }
      .typing span:nth-child(2) {
        animation-delay: 0.15s;
      }
      .typing span:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes typing {
        0%,
        80%,
        100% {
          opacity: 0.3;
          transform: scale(0.7);
        }
        40% {
          opacity: 1;
          transform: scale(1);
        }
      }
      .guard-badge {
        display: inline-block;
        font-size: 0.66rem;
        padding: 2px 8px;
        border-radius: 99px;
        margin-bottom: 4px;
      }
      .guard-badge.input {
        background: rgba(251, 146, 60, 0.12);
        color: #fdba74;
        border: 1px solid rgba(251, 146, 60, 0.3);
      }
      .guard-badge.output {
        background: rgba(239, 68, 68, 0.1);
        color: #fca5a5;
        border: 1px solid rgba(239, 68, 68, 0.3);
      }

      /* Composer */
      .composer {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 14px;
        padding: 8px 8px 8px 16px;
      }
      .composer textarea {
        flex: 1;
        background: transparent;
        border: none;
        color: #e2e8f0;
        font-size: 0.92rem;
        font-family: inherit;
        resize: none;
        outline: none;
        line-height: 1.5;
        padding: 8px 0;
        max-height: 140px;
      }
      .composer .send-btn {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        border: none;
        background: #06b6d4;
        color: #0f172a;
        font-weight: 800;
        cursor: pointer;
        font-size: 1.05rem;
        transition: all 0.15s;
        flex-shrink: 0;
      }
      .composer .send-btn:hover {
        background: #22d3ee;
      }
      .composer .send-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .composer .cancel-btn {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        border: none;
        background: #ef4444;
        color: white;
        font-weight: 800;
        cursor: pointer;
        font-size: 1.1rem;
        flex-shrink: 0;
      }

      .composer-hint {
        font-size: 0.7rem;
        color: #475569;
        margin-top: 6px;
        text-align: center;
      }

      /* Right-side info */
      .right-col h3 {
        font-size: 0.7rem;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
        margin-top: 16px;
      }
      .right-col h3:first-child {
        margin-top: 0;
      }
      .right-col .stat {
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 8px;
      }
      .stat-label {
        font-size: 0.7rem;
        color: #64748b;
      }
      .stat-val {
        font-size: 1.1rem;
        font-weight: 700;
        color: #22d3ee;
        font-family: "Consolas", monospace;
        margin-top: 2px;
      }
      .persona-card {
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 12px;
      }
      .persona-card .pc-emoji {
        font-size: 1.4rem;
        margin-bottom: 4px;
      }
      .persona-card .pc-name {
        font-size: 0.92rem;
        font-weight: 700;
        color: #f1f5f9;
      }
      .persona-card .pc-tag {
        font-size: 0.72rem;
        color: #94a3b8;
        margin-top: 2px;
      }
      .examples {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .ex-btn {
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 7px;
        color: #94a3b8;
        padding: 8px 10px;
        font-size: 0.74rem;
        text-align: left;
        cursor: pointer;
        transition: all 0.15s;
        font-family: inherit;
        line-height: 1.4;
      }
      .ex-btn:hover {
        border-color: #06b6d4;
        color: #cbd5e1;
      }

      /* Empty state */
      .empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex: 1;
        color: #64748b;
        text-align: center;
        padding: 40px 20px;
        gap: 12px;
      }
      .empty-icon {
        font-size: 2.4rem;
        opacity: 0.6;
      }
      .empty-title {
        font-size: 1rem;
        color: #94a3b8;
      }
      .empty-sub {
        font-size: 0.82rem;
        color: #475569;
        max-width: 320px;
      }

      @media (max-width: 760px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .right-col {
          border-left: none;
          border-top: 1px solid #334155;
          max-height: 200px;
        }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="brand"><span class="brand-dot"></span>Module 5 Chatbot</div>
      <div class="topbar-spacer"></div>
      <div class="selector">
        <label>Persona</label>
        <select id="personaSelect"></select>
      </div>
      <div class="selector">
        <label>Memory</label>
        <select id="strategySelect">
          <option value="sliding">Sliding window</option>
          <option value="full">Full history</option>
          <option value="summary">Running summary</option>
        </select>
      </div>
      <button class="btn btn-secondary" onclick="resetSession()">Reset</button>
    </div>

    <div class="layout">
      <div class="chat-col">
        <div class="chat-window" id="chatWindow">
          <div class="empty" id="emptyState">
            <div class="empty-icon">💬</div>
            <div class="empty-title">Say hi to get started</div>
            <div class="empty-sub">
              Pick a persona above, then ask anything. Replies stream token by
              token.
            </div>
          </div>
        </div>

        <div class="composer">
          <textarea
            id="composer"
            rows="1"
            placeholder="Type a message — Enter to send, Shift+Enter for newline"
          ></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            ▶
          </button>
          <button
            class="cancel-btn"
            id="cancelBtn"
            onclick="cancelStream()"
            style="display: none"
          >
            ⏹
          </button>
        </div>
        <div class="composer-hint" id="composerHint">Ready.</div>
      </div>

      <div class="right-col">
        <div class="persona-card" id="personaCard">
          <div class="pc-emoji" id="pcEmoji">📚</div>
          <div class="pc-name" id="pcName">Nova</div>
          <div class="pc-tag" id="pcTag">Study buddy for students</div>
        </div>

        <h3>Session</h3>
        <div class="stat">
          <div class="stat-label">Turns</div>
          <div class="stat-val" id="s-turns">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Total input tokens</div>
          <div class="stat-val" id="s-in">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Total output tokens</div>
          <div class="stat-val" id="s-out">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Estimated cost so far</div>
          <div class="stat-val" id="s-cost">$0.0000</div>
        </div>

        <h3>Try these</h3>
        <div class="examples" id="examplesBox"></div>
      </div>
    </div>

    <script>
      const SESSION = {
        sid: null,
        persona: "nova",
        strategy: "sliding",
        personas: [],
      };
      let abortCtl = null;

      const EXAMPLES = {
        nova: [
          "Explain photosynthesis in plain English.",
          "Quiz me on World War II.",
          "How do derivatives work?",
        ],
        aurora: [
          "Look up booking ABC123.",
          "What's the baggage policy for economy?",
          "Hi, how can you help?",
        ],
        bean: [
          "A large oat latte please.",
          "What pastries do you have?",
          "Anything strong and not too sweet?",
        ],
        atlas: [
          "Plan a 5-day Tokyo trip.",
          "I'm vegetarian — any restaurant tips for Kyoto?",
          "Best month for cherry blossoms?",
        ],
      };

      const PRICE_PER_1K_INPUT = 0.00015;
      const PRICE_PER_1K_OUTPUT = 0.0006;

      async function loadPersonas() {
        const res = await fetch("/api/personas");
        SESSION.personas = await res.json();
        const sel = document.getElementById("personaSelect");
        sel.innerHTML = "";
        for (const p of SESSION.personas) {
          const opt = document.createElement("option");
          opt.value = p.key;
          opt.textContent = `${p.emoji} ${p.name}`;
          sel.appendChild(opt);
        }
        sel.value = SESSION.persona;
        renderPersonaCard();
        renderExamples();
      }

      document.getElementById("personaSelect").onchange = (e) => {
        SESSION.persona = e.target.value;
        renderPersonaCard();
        renderExamples();
        resetSession();
      };
      document.getElementById("strategySelect").onchange = (e) => {
        SESSION.strategy = e.target.value;
        resetSession();
      };

      function renderPersonaCard() {
        const p =
          SESSION.personas.find((x) => x.key === SESSION.persona) ||
          SESSION.personas[0];
        document.getElementById("pcEmoji").textContent = p.emoji;
        document.getElementById("pcName").textContent = p.name;
        document.getElementById("pcTag").textContent = p.tagline;
      }

      function renderExamples() {
        const box = document.getElementById("examplesBox");
        box.innerHTML = "";
        for (const ex of EXAMPLES[SESSION.persona] || EXAMPLES.nova) {
          const b = document.createElement("button");
          b.className = "ex-btn";
          b.textContent = ex;
          b.onclick = () => {
            document.getElementById("composer").value = ex;
            sendMessage();
          };
          box.appendChild(b);
        }
      }

      async function ensureSession() {
        if (SESSION.sid) return;
        const res = await fetch("/api/sessions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            persona: SESSION.persona,
            strategy: SESSION.strategy,
          }),
        });
        if (!res.ok) throw new Error("failed to create session");
        const data = await res.json();
        SESSION.sid = data.session_id;
      }

      async function resetSession() {
        if (SESSION.sid) {
          await fetch(`/api/sessions/${SESSION.sid}`, { method: "DELETE" });
        }
        SESSION.sid = null;
        document.getElementById("chatWindow").innerHTML =
          `<div class="empty" id="emptyState">
       <div class="empty-icon">💬</div>
       <div class="empty-title">Say hi to get started</div>
       <div class="empty-sub">Pick a persona above, then ask anything. Replies stream token by token.</div>
     </div>`;
        document.getElementById("s-turns").textContent = "0";
        document.getElementById("s-in").textContent = "0";
        document.getElementById("s-out").textContent = "0";
        document.getElementById("s-cost").textContent = "$0.0000";
        document.getElementById("composerHint").textContent = "Ready.";
      }

      function appendUser(text) {
        hideEmpty();
        const win = document.getElementById("chatWindow");
        const wrap = document.createElement("div");
        wrap.className = "msg user";
        wrap.innerHTML = `
    <div class="avatar">🧑</div>
    <div><div class="bubble"></div></div>`;
        wrap.querySelector(".bubble").textContent = text;
        win.appendChild(wrap);
        win.scrollTop = win.scrollHeight;
      }

      function appendBotSlot() {
        hideEmpty();
        const win = document.getElementById("chatWindow");
        const p =
          SESSION.personas.find((x) => x.key === SESSION.persona) ||
          SESSION.personas[0];
        const wrap = document.createElement("div");
        wrap.className = "msg bot";
        wrap.innerHTML = `
    <div class="avatar">${p ? p.emoji : "🤖"}</div>
    <div>
      <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
      <div class="msg-meta"></div>
    </div>`;
        win.appendChild(wrap);
        win.scrollTop = win.scrollHeight;
        return {
          bubble: wrap.querySelector(".bubble"),
          meta: wrap.querySelector(".msg-meta"),
        };
      }

      function hideEmpty() {
        const e = document.getElementById("emptyState");
        if (e) e.remove();
      }

      async function sendMessage() {
        const ta = document.getElementById("composer");
        const msg = ta.value.trim();
        if (!msg) return;
        ta.value = "";
        autosize();

        await ensureSession();
        appendUser(msg);
        const slot = appendBotSlot();
        setSending(true);

        abortCtl = new AbortController();

        try {
          const res = await fetch(`/api/sessions/${SESSION.sid}/chat`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: msg }),
            signal: abortCtl.signal,
          });
          if (!res.ok || !res.body) {
            const text = await res.text();
            slot.bubble.textContent = `Error: ${text}`;
            setSending(false);
            return;
          }

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buf = "";
          let collected = "";
          let firstToken = true;
          let guardBadge = "";
          const t0 = performance.now();
          let ttftMs = null;

          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            let idx;
            while ((idx = buf.indexOf("\n\n")) >= 0) {
              const raw = buf.slice(0, idx);
              buf = buf.slice(idx + 2);
              if (!raw.startsWith("data: ")) continue;
              const payload = raw.slice(6);
              let event;
              try {
                event = JSON.parse(payload);
              } catch {
                continue;
              }

              if (event.event === "meta") {
                slot.meta.textContent = `↪ ${event.messages_in_prompt} messages · ~${event.input_tokens_est} in-tok · ${event.strategy}`;
              } else if (event.event === "delta") {
                if (firstToken) {
                  firstToken = false;
                  ttftMs = Math.round(performance.now() - t0);
                  slot.bubble.innerHTML = guardBadge;
                }
                collected += event.delta;
                slot.bubble.innerHTML =
                  guardBadge +
                  escapeHtml(collected) +
                  '<span class="cursor"></span>';
                document.getElementById("chatWindow").scrollTop = 1e9;
              } else if (event.event === "guardrail") {
                guardBadge = `<div class="guard-badge ${event.stage}">${event.stage === "input" ? "Input blocked" : "Output blocked"} (${event.reason})</div>`;
              } else if (event.event === "done") {
                slot.bubble.innerHTML = guardBadge + escapeHtml(collected);
                const totalMs = Math.round(performance.now() - t0);
                slot.meta.textContent =
                  (ttftMs ? `TTFT ${ttftMs} ms · ` : "") +
                  `total ${totalMs} ms · ${event.input_tokens} in / ${event.output_tokens} out`;
                updateStats(event);
              } else if (event.event === "error") {
                slot.bubble.textContent = `Error: ${event.error}`;
              }
            }
          }
        } catch (err) {
          if (err.name === "AbortError") {
            slot.bubble.innerHTML =
              slot.bubble.innerHTML.replace(
                /<span class="cursor"><\/span>/,
                "",
              ) +
              ' <em style="color:#fdba74; font-size:0.75rem;">[cancelled]</em>';
          } else {
            slot.bubble.textContent = `Error: ${err.message}`;
          }
        }
        setSending(false);
      }

      function cancelStream() {
        if (abortCtl) {
          abortCtl.abort();
        }
      }

      function updateStats(ev) {
        document.getElementById("s-turns").textContent = ev.turn_count;
        document.getElementById("s-in").textContent = ev.total_input_tokens;
        document.getElementById("s-out").textContent = ev.total_output_tokens;
        const cost =
          (ev.total_input_tokens / 1000) * PRICE_PER_1K_INPUT +
          (ev.total_output_tokens / 1000) * PRICE_PER_1K_OUTPUT;
        document.getElementById("s-cost").textContent = "$" + cost.toFixed(4);
      }

      function setSending(busy) {
        document.getElementById("sendBtn").style.display = busy ? "none" : "";
        document.getElementById("cancelBtn").style.display = busy ? "" : "none";
        document.getElementById("composer").disabled = busy;
        document.getElementById("composerHint").textContent = busy
          ? "Generating… click ⏹ to cancel."
          : "Ready.";
      }

      function escapeHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function autosize() {
        const ta = document.getElementById("composer");
        ta.style.height = "auto";
        ta.style.height = Math.min(140, ta.scrollHeight) + "px";
      }

      document.getElementById("composer").addEventListener("input", autosize);
      document.getElementById("composer").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      loadPersonas();
    </script>
  </body>
</html>
